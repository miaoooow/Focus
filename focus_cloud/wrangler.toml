name = "focus-cloud"
main = "src/index.js"
compatibility_date = "2026-07-01"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "focus-accounts"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
ALLOWED_ORIGINS = "https://miaoooow.github.io,http://127.0.0.1,http://localhost,chrome-extension://"
DAILY_CHAT_LIMIT = "30"
DAILY_PET_LIMIT = "2"
TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct-fp8-fast"
PET_MODEL = "@cf/runwayml/stable-diffusion-v1-5-img2img"
