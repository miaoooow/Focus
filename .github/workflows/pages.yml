name: Deploy Focus Web

on:
  push:
    branches: [main]
    paths:
      - "web_standalone/**"
      - "assets/soundscapes/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Verify entry file
        shell: bash
        run: test -f web_standalone/index.html
      - name: Stage web edition
        shell: bash
        run: |
          mkdir -p site/media/sounds
          cp web_standalone/index.html web_standalone/styles.css web_standalone/app.js site/
          cp web_standalone/manifest.webmanifest web_standalone/sw.js site/
          cp pictures/*.png site/media/
          cp assets/soundscapes/*.ogg site/media/sounds/
      - name: Upload web edition
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
